<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- PC Tower body -->
  <rect x="9" y="6" width="14" height="20" rx="2" fill="#1e293b" stroke="#eab308" stroke-width="1"/>
  <!-- Power button circle -->
  <circle cx="16" cy="10" r="2" fill="none" stroke="#eab308" stroke-width="1"/>
  <!-- Drive bay slots -->
  <rect x="11" y="14" width="10" height="1.5" rx="0.5" fill="#eab308" opacity="0.7"/>
  <rect x="11" y="17" width="10" height="1.5" rx="0.5" fill="#eab308" opacity="0.4"/>
  <rect x="11" y="20" width="10" height="1.5" rx="0.5" fill="#eab308" opacity="0.2"/>
  <!-- RGB glow strip -->
  <rect x="9" y="22" width="14" height="2" rx="1" fill="#0ea5e9" opacity="0.8"/>
  <!-- Stand/base -->
  <rect x="12" y="26" width="8" height="1.5" rx="0.5" fill="#334155"/>
</svg>